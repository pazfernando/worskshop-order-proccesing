name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      payment_failure_mode:
        description: Payment simulator failure mode
        required: false
        default: none
        type: choice
        options:
          - none
          - always_fail
          - random_fail
          - slow_response
          - random_reject

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME != '' && vars.STACK_NAME || 'observability-business-case' }}
      PAYMENT_FAILURE_MODE: ${{ inputs.payment_failure_mode != '' && inputs.payment_failure_mode || vars.PAYMENT_FAILURE_MODE || 'none' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Prepare Lambda bundle
        run: bash scripts/prepare-lambda-package.sh

      - name: Initialize Terraform
        run: |
          test -n "$TF_STATE_BUCKET"
          terraform -chdir=infra/terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY:-${STACK_NAME}.tfstate}" \
            -backend-config="region=${AWS_REGION}"

      - name: Deploy stack
        run: |
          terraform -chdir=infra/terraform apply \
            -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="stack_name=${STACK_NAME}" \
            -var="payment_failure_mode=${PAYMENT_FAILURE_MODE}"

      - name: Show API URL
        run: terraform -chdir=infra/terraform output -raw api_base_url
